services:
  db:
    image: postgres:17
    container_name: lto_pg
    restart: unless-stopped
    # Keep PostgreSQL from starving the archiver/robocopy under heavy Phase-3
    # sync + maintenance load; size to the workstation's RAM.
    mem_limit: 6g
    environment:
      POSTGRES_DB: lto_archive
      POSTGRES_USER: lto
      POSTGRES_PASSWORD: ${PGPASSWORD:-change_me_local}
    ports:
      # Loopback only — the catalog must not be reachable from the LAN.
      - "127.0.0.1:5432:5432"
    volumes:
      - lto_pgdata:/var/lib/postgresql/data
      - ./scripts/pg_init:/docker-entrypoint-initdb.d:ro
    # /dev/shm is sized well above the migration-local 512MB GIN build budget:
    # 2GB shared_buffers + 512MB maintenance_work_mem + ~1.5GB overhead/headroom.
    shm_size: "4gb"
    command:
      - "postgres"
      - "-c"
      - "max_connections=50"
      - "-c"
      - "shared_buffers=2GB"
      # Sized against mem_limit (6g): maintenance_work_mem is a real
      # allocation per maintenance worker, so 2GB of it on top of 2GB
      # shared_buffers + work_mem risked a cgroup OOM kill during large GIN
      # index builds; effective_cache_size is planner advice and must not
      # exceed what the capped container can actually cache.
      - "-c"
      - "effective_cache_size=4GB"
      - "-c"
      - "work_mem=64MB"
      - "-c"
      - "maintenance_work_mem=1GB"
      - "-c"
      - "max_wal_size=8GB"
      - "-c"
      - "checkpoint_timeout=30min"
      - "-c"
      - "max_parallel_maintenance_workers=4"
      - "-c"
      - "max_parallel_workers_per_gather=4"
      - "-c"
      - "wal_compression=on"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lto -d lto_archive"]
      interval: 5s
      timeout: 5s
      retries: 10

  cold_manifest_db:
    image: postgres:17
    container_name: lto_cold_manifest_pg
    restart: unless-stopped
    mem_limit: 1g
    cpus: "1.0"
    environment:
      POSTGRES_DB: lto_cold_manifest
      POSTGRES_USER: lto_cold
      POSTGRES_PASSWORD: ${COLD_PGPASSWORD:-change_me_cold_local}
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - lto_cold_manifest_pgdata:/var/lib/postgresql/data
    shm_size: "256mb"
    command:
      - "postgres"
      - "-c"
      - "max_connections=20"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "effective_cache_size=512MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "max_parallel_workers_per_gather=0"
      - "-c"
      - "max_parallel_maintenance_workers=0"
      - "-c"
      - "wal_compression=on"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lto_cold -d lto_cold_manifest"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  lto_pgdata:
  lto_cold_manifest_pgdata:
