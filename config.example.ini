; Template configuration. Copy this file to "config.ini" and fill in real
; values. "config.ini" is gitignored so your host, paths, and selected folders
; never get committed. Secrets (the remote password) live in ".env" — see
; ".env.example".

[PATHS]
source_dir = "C:\path\to\source"
staging_dir = "C:\path\to\staging"
restore_dir = "C:\path\to\restored"

[DATABASE]
; PostgreSQL is the only supported catalog backend.
host = localhost
port = 5432
dbname = lto_archive
user = lto
; sslmode: 'prefer' is fine for a loopback/Docker server (no TLS offered). For
; any NON-loopback host use 'require' at minimum, or 'verify-full' to also
; authenticate the server — otherwise credentials and paths can travel in clear.
sslmode = prefer

[HARDWARE]
lto_drive = E:\\
ibm_eject_cmd = "C:\Program Files\IBM\LTFS\LtfsCmdEject.exe"

[SETTINGS]
zip_threshold_mb = 2048
max_zip_size_gb = 20

[REMOTE]
remote_host = your.remote.host
remote_user = your-username
; Leave blank here; set REMOTE_PASSWORD in .env instead (see .env.example).
remote_password =
remote_path = /path/to/remote/source
; One path per indented line; each must be under remote_path.
remote_selected_paths =
    /path/to/remote/source/subdir_a
    /path/to/remote/source/subdir_b
confirm_before_backup = true
staging_fill_pct = 0.80

[PERFORMANCE]
; Continuous-streaming pipeline: prefetch chunks to NVMe staging so the LTO
; tape never starves (no shoe-shining) while the network fetch runs.
; NOTE: keep comments on their own lines — inline comments after a value are
; treated as part of the value by the config parser.
; chunk_cap_gb: hard cap per chunk in GB (100-125 recommended)
chunk_cap_gb          = 100
; prefetch_chunks_ahead: max chunks fetched/packed ahead of the tape writer
prefetch_chunks_ahead = 4
; staging_max_gb: hard backpressure — total staging usage never exceeds this
staging_max_gb        = 700
; robocopy_priority: tape-write CPU priority — high | normal | realtime (realtime needs admin)
robocopy_priority     = high
; cpu_affinity: auto | off | "fetch=0-5;tape=6-7" (isolate fetch cores from tape cores)
cpu_affinity          = auto
; ssh_cipher: fast AES-NI cipher for the fetch stream
ssh_cipher            = aes128-gcm@openssh.com
; ssh_command_timeout_seconds: max time for remote command-style SSH calls
ssh_command_timeout_seconds = 3600
; use_mbuffer: wrap the remote tar in mbuffer (must be installed on the remote host)
use_mbuffer           = false
; mbuffer_size: remote-side mbuffer RAM ring size
mbuffer_size          = 2G

[TELEGRAM]
; Optional push notifications for backup summaries and Storage Map outcomes.
; Leave disabled unless TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID are set in .env.
enabled = false
timeout_seconds = 10

[STORAGE_MAP]
; --- Storage Map & Analytics -----------------------------------------------
; Two-stage, decoupled remote disk-usage mapper. Mounts are loaded from here
; (never hardcoded) so they can be adjusted per server at any time. SSH user /
; password default to the [REMOTE] account (secret still in .env).
; Local directory for raw logs + generated HTML treemaps (relative to project root).
output_dir = storage_map/logs
; Directory for the self-contained HTML dashboard (index.html).
dashboard_dir = storage_map
; du reporting depth (Mount -> immediate child, plus one level inside shared-data).
scan_depth = 2
; Advisory upper bound on remote scan time (scan/fetch never block this long).
poll_timeout_seconds = 14400
; Shared mount list scanned on every server (one path per line, or comma list).
; A [STORAGE_MAP:<name>] section may override this with its own 'mounts'.
mounts =
    /strg/D
    /strg/E
    /data
    /strg/C
    /data_ssd
    /
; Servers to scan (each needs a matching [STORAGE_MAP:<name>] section below).
servers = so01, so02
; --- Storage Map v2 web dashboard (python storage_map/serve.py) --------------
; All optional; the web app runs with these defaults without any edits.
; Bind address for the local web server. Keep it loopback-only unless you
; really want the dashboard (and its scan/fetch buttons) reachable on the LAN.
;web_host = 127.0.0.1
;web_port = 8765
; Directory levels below each mount compared against the archive DB in the
; tape-coverage table. Depth 2 is used only inside shared-data.
;match_depth = 2
; Optional mapping of files_index.source_host values to server names above,
; for DB hosts whose short hostname differs from the config name.
; Format: dbhost:server, dbhost2:server2
;host_map =

[STORAGE_MAP:so01]
host = so01.example.host
user = your-username

[STORAGE_MAP:so02]
host = so02.example.host
user = your-username
