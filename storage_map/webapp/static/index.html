<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Storage Map</title>
<link rel="stylesheet" href="/static/style.css?v=20260712-3">
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <h1>Storage Map</h1>
      <div class="sub" id="subtitle">lab disk usage &amp; tape coverage</div>
    </div>
    <div class="actions">
      <button id="btn-scan" title="Launch a fire-and-forget du scan on the servers (runs for hours; safe to close this page)">Start scan</button>
      <button id="btn-status" title="Ask each server whether its scan has finished">Check status</button>
      <button id="btn-fetch" class="primary" title="Fetch completed scan results from every configured server and refresh the dashboard">Refresh servers</button>
      <button id="btn-coverage" title="Re-aggregate the tape catalog database">Refresh DB coverage</button>
      <button id="btn-export-html" title="Save the visible dashboard as one self-contained HTML file in the docs directory">Export HTML</button>
    </div>
  </header>
  <div id="statusline"></div>

  <div class="kpi-row" id="kpis"></div>
  <div id="server-panels"></div>

  <section class="panel">
    <div class="panel-head"><div>
      <h2>Tape coverage</h2>
      <div class="panel-sub" id="coverage-sub">Server directories vs the archive database</div>
    </div>
    <label class="cov-toggle" title="Hide directories with nothing on tape yet">
      <input type="checkbox" id="cov-archived-only"> only archived
    </label></div>
    <div id="coverage"></div>
  </section>

  <footer>Storage Map &amp; Analytics · interactive dashboard · data stays on this machine</footer>
</div>
<script src="/static/app.js?v=20260712-3"></script>
</body>
</html>
